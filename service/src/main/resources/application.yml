config:
  admin:
    password: aaaaaa
    reset-pwd-when-updated-at: 1235
  signup:
    # true: assign administrator role on registration (demo default)
    register-as-admin: true
  issuer: io.github.jinganix.admin.starter
  jwt-secret: test-jwt-secret

server:
  port: 8080

spring:
  application:
    name: admin-starter-service
  profiles:
    default: local
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/admin_starter
    username: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false
    visibility:
      field: none
      getter: any
      is-getter: any
      setter: any
  data:
    redis:
      url: redis://127.0.0.1:6379
